<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="4" y="4" width="192" height="192" rx="38" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <!-- Envelope icon -->
  <rect x="50" y="65" width="100" height="70" rx="8" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <polyline points="50,65 100,105 150,65" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold sparkle for AI -->
  <circle cx="148" cy="58" r="8" fill="#FBBE14" opacity="0.9"/>
  <line x1="148" y1="48" x2="148" y2="68" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
  <line x1="138" y1="58" x2="158" y2="58" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
  <!-- K initial -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#3B82F6" opacity="0.5">KIMMI</text>
</svg>
