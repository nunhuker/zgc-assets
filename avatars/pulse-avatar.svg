<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#6EE7B7"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="4" y="4" width="192" height="192" rx="38" fill="none" stroke="#34D399" stroke-width="2" opacity="0.3"/>
  <!-- Heartbeat/pulse line -->
  <polyline points="30,100 60,100 75,60 90,140 105,80 120,120 135,100 170,100" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Monitoring dot -->
  <circle cx="170" cy="100" r="6" fill="#34D399"/>
  <circle cx="170" cy="100" r="10" fill="none" stroke="#34D399" stroke-width="2" opacity="0.4"/>
  <!-- Gold sparkle for AI -->
  <circle cx="155" cy="55" r="8" fill="#FBBE14" opacity="0.9"/>
  <line x1="155" y1="45" x2="155" y2="65" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
  <line x1="145" y1="55" x2="165" y2="55" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
  <!-- Name -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#34D399" opacity="0.5">PULSE</text>
</svg>
