  <circle cx="100" cy="95" r="12" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <!-- Gear teeth -->
  <line x1="100" y1="63" x2="100" y2="55" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="127" x2="100" y2="135" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="68" y1="95" x2="60" y2="95" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="132" y1="95" x2="140" y2="95" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="80" y1="75" x2="74" y2="69" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="115" x2="126" y2="121" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="75" x2="126" y2="69" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <line x1="80" y1="115" x2="74" y2="121" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
  <!-- Gold sparkle for AI -->
  <circle cx="148" cy="55" r="8" fill="#FBBE14" opacity="0.9"/>
  <line x1="148" y1="45" x2="148" y2="65" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
  <line x1="138" y1="55" x2="158" y2="55" stroke="#FBBE14" stroke-width="2" stroke-linecap="round"/>
