  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <rect x="4" y="4" width="192" height="192" rx="38" fill="none" stroke="#F97316" stroke-width="2" opacity="0.3"/>
  <!-- Factory/gear icon -->
